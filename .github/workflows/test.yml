name: Tests

on:
  push:
    branches: [ main, develop, refactor/v2.0 ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        npm install
        echo "=== Checking node_modules ==="
        ls -la node_modules/@openzeppelin/ 2>/dev/null || echo "OpenZeppelin not found"
        npm ls @openzeppelin/contracts || npm install @openzeppelin/contracts@^5.0.0
        echo "=== After install ==="
        ls -la node_modules/@openzeppelin/contracts/ 2>/dev/null || echo "Still not found"
    
    - name: Compile contracts
      run: npx hardhat compile
    
    - name: Run contract tests
      run: npm run contract:test
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: contracts
        name: contract-coverage

  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run backend tests
      run: npm test
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: backend
        name: backend-coverage

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run linter
      run: npm run lint
    
    - name: Check code formatting
      run: npm run format:check

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Slither
      uses: crytic/slither-action@v0.3.0
      with:
        node-version: '18'
        fail-on: 'high'
    
    - name: Run npm audit
      run: npm audit --audit-level=high
