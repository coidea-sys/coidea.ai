name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: cd frontend && npm install
    
    - name: Build (Amoy Testnet)
      run: cd frontend && npm run build
      env:
        REACT_APP_NETWORK: amoy
        REACT_APP_CHAIN_ID: 80002
        REACT_APP_NETWORK_NAME: "Polygon Amoy Testnet"
        REACT_APP_API_URL: ${{ secrets.AMOY_RPC_URL || 'https://rpc-amoy.polygon.technology' }}
        CI: false
    
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: coidea-ai
        directory: frontend/build
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
