# 统一的 CI/CD 工作流 - 简化版
# 每个 job 独立安装，使用缓存加速

name: CI/CD

on:
  push:
    branches: [main, develop, feature/*, refactor/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  FORCE_COLOR: '1'

jobs:
  # ==========================================
  # 代码质量检查
  # ==========================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - run: npm run lint || true
      - run: npm run format:check || true

  # ==========================================
  # 合约编译和测试
  # ==========================================
  contracts:
    name: 🧪 Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Compile contracts
        run: npx hardhat compile
      - name: Run contract tests
        run: npx hardhat test --network hardhat

  # ==========================================
  # 前端测试
  # ==========================================
  frontend:
    name: 🧪 Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install root deps
        run: npm install --legacy-peer-deps
      - name: Install frontend deps
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test -- --watchAll=false

  # ==========================================
  # 安全审计
  # ==========================================
  security:
    name: 🛡️ Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run Slither
        uses: crytic/slither-action@v0.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          fail-on: 'high'
        continue-on-error: true

  # ==========================================
  # 部署到测试网
  # ==========================================
  deploy-testnet:
    name: 🚀 Deploy Testnet
    runs-on: ubuntu-latest
    needs: [contracts, frontend, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: amoy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Deploy to Amoy
        env:
          PRIVATE_KEY: ${{ secrets.AMOY_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.AMOY_RPC_URL }}
        run: npx hardhat run scripts/deploy-all.js --network polygonAmoy

  # ==========================================
  # 部署前端
  # ==========================================
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-testnet
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build
        env:
          CI: false
          REACT_APP_NETWORK: amoy
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: coidea-ai
          directory: frontend/build
