# CI/CD Pipeline for coidea.ai
# Agile + TDD Workflow

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  FORCE_COLOR: '1'

jobs:
  # ==========================================
  # Phase 1: Code Quality (Fast Feedback)
  # ==========================================
  lint-and-format:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Run TypeScript check
        run: npm run typecheck || true

  # ==========================================
  # Phase 2: Unit Tests (TDD - Red Phase)
  # ==========================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      matrix:
        test-type: [contracts, backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Contract Tests
      - name: Compile contracts
        if: matrix.test-type == 'contracts'
        run: npm run contract:compile

      - name: Run contract tests
        if: matrix.test-type == 'contracts'
        run: npm run contract:test

      # Backend Tests
      - name: Run backend tests
        if: matrix.test-type == 'backend'
        run: npm run test:unit

      # Frontend Tests
      - name: Run frontend tests
        if: matrix.test-type == 'frontend'
        run: cd frontend && npm ci && npm test -- --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.test-type }}
          name: ${{ matrix.test-type }}-coverage

  # ==========================================
  # Phase 3: Integration Tests (TDD - Green Phase)
  # ==========================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start Hardhat node
        run: npx hardhat node &
        env:
          HARDHAT_NETWORK: localhost

      - name: Wait for node
        run: sleep 5

      - name: Deploy to local node
        run: npx hardhat run scripts/deploy.js --network localhost

      - name: Run integration tests
        run: npm run test:integration

      - name: Run E2E tests
        run: npm run test:e2e || true

  # ==========================================
  # Phase 4: Security Audit (TDD - Refactor Phase)
  # ==========================================
  security-audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Slither analysis
        uses: crytic/slither-action@v0.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          fail-on: 'high'
          slither-args: '--config-file slither.config.json'

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run security tests
        run: npm run test:security || true

  # ==========================================
  # Phase 5: Performance Tests
  # ==========================================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run performance tests
        run: npm run test:performance

      - name: Check bundle size
        run: cd frontend && npm run build && npx bundlesize || true

  # ==========================================
  # Phase 6: Deploy to Amoy (Testnet)
  # ==========================================
  deploy-amoy:
    name: 🚀 Deploy to Amoy
    runs-on: ubuntu-latest
    needs: [integration-tests, security-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: amoy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy contracts to Amoy
        env:
          PRIVATE_KEY: ${{ secrets.AMOY_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.AMOY_RPC_URL }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          echo "Deploying to Amoy testnet..."
          npx hardhat run scripts/deploy.js --network polygonAmoy
          npx hardhat run scripts/tdd-deploy-missing.js --network polygonAmoy || true

      - name: Verify contracts on PolygonScan
        env:
          PRIVATE_KEY: ${{ secrets.AMOY_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.AMOY_RPC_URL }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          echo "Verifying on PolygonScan..."
          npm run verify:amoy || true

      - name: Verify contracts on Sourcify
        env:
          PRIVATE_KEY: ${{ secrets.AMOY_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.AMOY_RPC_URL }}
        run: |
          echo "Verifying on Sourcify..."
          ./scripts/verify-sourcify.sh || true

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amoy-deployment-${{ github.run_number }}
          path: deployments/
          retention-days: 30

      - name: Post deployment summary
        run: |
          echo "## Amoy Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Phase 7: Deploy Frontend (Cloudflare)
  # ==========================================
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: [integration-tests, security-audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          CI: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_CHAIN_ID: 137
          REACT_APP_NETWORK_NAME: "Polygon Mainnet"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: coidea-ai
          directory: frontend/build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Phase 8: Deploy to Production (Mainnet) - Auto Deploy
  # ==========================================
  deploy-production:
    name: 🏭 Deploy to Mainnet
    runs-on: ubuntu-latest
    needs: [deploy-amoy, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Confirm mainnet deployment
        run: |
          echo "🚀 Auto-deploying to Polygon Mainnet..."
          echo "This will deploy contracts to production network."
          echo "Amoy deployment status: ${{ needs.deploy-amoy.result }}"
          echo "Frontend deployment status: ${{ needs.deploy-frontend.result }}"
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy contracts to Mainnet
        env:
          MAINNET_PRIVATE_KEY: ${{ secrets.MAINNET_PRIVATE_KEY }}
          POLYGON_RPC_URL: https://polygon-rpc.com
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          echo "🚀 Deploying to Polygon Mainnet..."
          npx hardhat run scripts/deploy.js --network polygon
          npx hardhat run scripts/tdd-deploy-missing.js --network polygon || true

      - name: Verify contracts on PolygonScan
        env:
          MAINNET_PRIVATE_KEY: ${{ secrets.MAINNET_PRIVATE_KEY }}
          POLYGON_RPC_URL: https://polygon-rpc.com
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          echo "Verifying on PolygonScan..."
          npm run verify:polygon || true

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-deployment-${{ github.run_number }}
          path: deployments/
          retention-days: 90

      - name: Create deployment tag
        run: |
          git tag -a "v${{ github.run_number }}" -m "Production deployment ${{ github.run_number }}"
          git push origin "v${{ github.run_number }}"

      - name: Post deployment summary
        run: |
          echo "## 🎉 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Checklist" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Contracts deployed" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Contracts verified" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Frontend deployed" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Tag created" >> $GITHUB_STEP_SUMMARY
