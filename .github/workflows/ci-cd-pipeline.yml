# CI/CD Pipeline for coidea.ai
# Agile + TDD Workflow
# Note: Mainnet deployment is DISABLED until v1.0 release

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*, refactor/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  FORCE_COLOR: '1'

jobs:
  # ==========================================
  # Phase 1: Code Quality (Fast Feedback)
  # ==========================================
  lint-and-format:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      - name: Run ESLint
        run: npm run lint || true

      - name: Check code formatting
        run: npm run format:check || true

      - name: Run TypeScript check
        run: npm run typecheck || true

  # ==========================================
  # Phase 2: Unit Tests (TDD - Red Phase)
  # ==========================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      matrix:
        test-type: [contracts, backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      # Contract Tests
      - name: Compile contracts
        if: matrix.test-type == 'contracts'
        run: npm run contract:compile

      - name: Run contract tests
        if: matrix.test-type == 'contracts'
        run: npm run contract:test

      # Backend Tests
      - name: Run backend tests
        if: matrix.test-type == 'backend'
        run: npm run test:unit || true

      # Frontend Tests
      - name: Run frontend tests
        if: matrix.test-type == 'frontend'
        run: cd frontend && npm install && npm test -- --watchAll=false || true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.test-type }}
          name: ${{ matrix.test-type }}-coverage
        continue-on-error: true

  # ==========================================
  # Phase 3: Integration Tests (TDD - Green Phase)
  # ==========================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      - name: Start Hardhat node
        run: npx hardhat node &
        env:
          HARDHAT_NETWORK: localhost

      - name: Wait for node
        run: sleep 5

      - name: Deploy to local node
        run: npx hardhat run scripts/deploy-all.js --network localhost

      - name: Run integration tests
        run: npm run test:integration || true

      - name: Run E2E tests
        run: npm run test:e2e || true

  # ==========================================
  # Phase 4: Security Audit (TDD - Refactor Phase)
  # ==========================================
  security-audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      - name: Run Slither analysis
        uses: crytic/slither-action@v0.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          fail-on: 'high'
          slither-args: '--config-file slither.config.json'
        continue-on-error: true

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Run security tests
        run: npm run test:security || true

  # ==========================================
  # Phase 5: Performance Tests
  # ==========================================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      - name: Run performance tests
        run: npm run test:performance || true

      - name: Check bundle size
        run: cd frontend && npm run build && npx bundlesize || true

  # ==========================================
  # Phase 6: Check Contract Changes
  # ==========================================
  check-contract-changes:
    name: 📋 Check Contract Changes
    runs-on: ubuntu-latest
    outputs:
      contracts_changed: ${{ steps.check.outputs.contracts_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if contracts changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^contracts/"; then
            echo "contracts_changed=true" >> $GITHUB_OUTPUT
            echo "Contract changes detected"
          else
            echo "contracts_changed=false" >> $GITHUB_OUTPUT
            echo "No contract changes"
          fi

  # ==========================================
  # Phase 7: Deploy to Amoy (Testnet)
  # Only runs when contracts change
  # ==========================================
  deploy-amoy:
    name: 🚀 Deploy to Amoy
    runs-on: ubuntu-latest
    needs: [integration-tests, security-audit, check-contract-changes]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      needs.check-contract-changes.outputs.contracts_changed == 'true'
    environment: amoy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      - name: Deploy contracts to Amoy
        env:
          PRIVATE_KEY: ${{ secrets.AMOY_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.AMOY_RPC_URL || 'https://rpc-amoy.polygon.technology' }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          echo "🚀 Deploying to Amoy testnet..."
          npx hardhat run scripts/deploy-all.js --network polygonAmoy

      - name: Verify contracts on Sourcify
        env:
          PRIVATE_KEY: ${{ secrets.AMOY_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.AMOY_RPC_URL || 'https://rpc-amoy.polygon.technology' }}
        run: |
          echo "🔍 Verifying on Sourcify..."
          node scripts/verify-sourcify-all.js || true

      - name: Update frontend config
        run: |
          echo "📝 Updating frontend network config..."
          node scripts/update-frontend-config.js || true

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amoy-deployment-${{ github.run_number }}
          path: deployments/
          retention-days: 30

      - name: Post deployment summary
        run: |
          echo "## 🚀 Amoy Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Contracts" >> $GITHUB_STEP_SUMMARY
          cat deployments/polygonAmoy.json | jq -r '.contracts | to_entries[] | "- \(.key): `\(.value)`"' >> $GITHUB_STEP_SUMMARY || true

  # ==========================================
  # Phase 8: Deploy Frontend (Cloudflare)
  # Uses Amoy testnet configuration
  # ==========================================
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: [integration-tests, security-audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd frontend && npm install

      - name: Build frontend (Amoy Testnet)
        run: cd frontend && npm run build
        env:
          CI: false
          REACT_APP_NETWORK: amoy
          REACT_APP_CHAIN_ID: 80002
          REACT_APP_NETWORK_NAME: "Polygon Amoy Testnet"
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://rpc-amoy.polygon.technology' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: coidea-ai
          directory: frontend/build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Post deployment summary
        run: |
          echo "## 🌐 Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Amoy Testnet" >> $GITHUB_STEP_SUMMARY
          echo "- Chain ID: 80002" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Phase 9: Deploy to Production (Mainnet)
  # ⚠️ DISABLED until v1.0 release
  # Manual trigger only via workflow_dispatch
  # ==========================================
  deploy-production:
    name: 🏭 Deploy to Mainnet (MANUAL ONLY)
    runs-on: ubuntu-latest
    # Only manual trigger - never auto-deploy
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: ⚠️ Production deployment is disabled
        run: |
          echo "❌ Automatic mainnet deployment is disabled"
          echo "Mainnet deployment requires manual approval after v1.0 release"
          exit 1

      # The following steps are commented out until v1.0
      # - uses: actions/checkout@v4
      # - name: Deploy to Mainnet...
