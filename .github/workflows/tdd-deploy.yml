# CI/CD Pipeline for coidea.ai
# TDD + Cloudflare Deployment

name: TDD + Deploy Pipeline

on:
  push:
    branches: [main, develop, refactor/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  FORCE_COLOR: '1'

jobs:
  # ==========================================
  # Phase 1: Code Quality
  # ==========================================
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm ls @openzeppelin/contracts || npm install @openzeppelin/contracts@^5.0.0

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run ESLint
        run: npm run lint 2>/dev/null || echo "No lint script"

  # ==========================================
  # Phase 2: Contract Tests
  # ==========================================
  contract-tests:
    name: 🧪 Contract Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @openzeppelin/contracts@^5.0.0 --force

      - name: Verify OpenZeppelin installation
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing node_modules/@openzeppelin/:"
          ls -la node_modules/@openzeppelin/ 2>/dev/null || echo "OpenZeppelin directory not found"
          echo "Checking for ReentrancyGuard.sol:"
          find node_modules -name "ReentrancyGuard.sol" 2>/dev/null || echo "ReentrancyGuard.sol not found"
          echo "Package.json dependencies:"
          cat package.json | grep -A5 "dependencies"

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test --network hardhat

  # ==========================================
  # Phase 3: Frontend Tests
  # ==========================================
  frontend-tests:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run tests
        run: cd frontend && npm test -- --watchAll=false

  # ==========================================
  # Phase 4: Build Frontend
  # ==========================================
  build-frontend:
    name: 📦 Build Frontend
    runs-on: ubuntu-latest
    needs: [contract-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build
        env:
          CI: false
          REACT_APP_NETWORK: amoy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  # ==========================================
  # Phase 5: Deploy to Cloudflare
  # ==========================================
  deploy-cloudflare:
    name: 🚀 Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/refactor/v2.0'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: coidea-ai
          directory: frontend/build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Live at: https://coidea-ai.pages.dev" >> $GITHUB_STEP_SUMMARY
