name = "coidea-demo"
main = "frontend/build/index.html"
compatibility_date = "2024-01-01"

[build]
command = "cd frontend && npm install && npm run build"

[site]
bucket = "frontend/build"

[env.production]
name = "coidea-demo"

# 环境变量
[env.production.vars]
REACT_APP_MOCK_MODE = "true"
REACT_APP_NETWORK = "localhost"

[[env.production.vars]]
REACT_APP_LOCAL_AI_AGENT_REGISTRY_ADDRESS = "0x0000000000000000000000000000000000000000"
REACT_APP_LOCAL_HUMAN_LEVEL_NFT_ADDRESS = "0x0000000000000000000000000000000000000000"
REACT_APP_LOCAL_TASK_REGISTRY_ADDRESS = "0x0000000000000000000000000000000000000000"
REACT_APP_LOCAL_X402_PAYMENT_ADDRESS = "0x0000000000000000000000000000000000000000"
REACT_APP_LOCAL_COMMUNITY_GOVERNANCE_ADDRESS = "0x0000000000000000000000000000000000000000"
